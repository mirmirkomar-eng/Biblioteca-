<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5c3a21">
<title>Papa y Cebolla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5ead8;
    --bg-card: #fffbf2;
    --ink: #2a1a0e;
    --ink-soft: #6b4f3a;
    --brown: #5c3a21;
    --brown-deep: #3d2614;
    --accent: #c84b1e;
    --accent-soft: #f4a261;
    --green: #4a6b2e;
    --warning-bg: #fff4d4;
    --warning-border: #e8b94d;
    --warning-ink: #6b4a0e;
    --danger-bg: #ffe3d4;
    --danger-border: #e88550;
    --danger-ink: #7a2e0e;
    --line: #d9c4a3;
    --shadow: 0 2px 0 rgba(61, 38, 20, 0.08), 0 8px 24px rgba(61, 38, 20, 0.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 16px;
    padding-bottom: 80px;
    font-size: 17px;
    line-height: 1.4;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(200, 75, 30, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(74, 107, 46, 0.04) 0%, transparent 50%);
  }
  header {
    text-align: center;
    margin: 8px 0 24px;
    padding-bottom: 20px;
    border-bottom: 2px dashed var(--line);
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 34px;
    margin: 0;
    color: var(--brown-deep);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  h1 .amp {
    color: var(--accent);
    font-style: italic;
    font-weight: 500;
    font-size: 28px;
    margin: 0 4px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 6px;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .search-wrap {
    position: sticky;
    top: 8px;
    z-index: 10;
    margin-bottom: 16px;
  }
  .search-box {
    position: relative;
    background: var(--bg-card);
    border: 2px solid var(--brown-deep);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .search-box input {
    width: 100%;
    border: none;
    background: transparent;
    padding: 18px 50px 18px 20px;
    font-size: 18px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    font-weight: 500;
  }
  .search-box input::placeholder { color: var(--ink-soft); opacity: 0.7; }
  .search-icon {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    pointer-events: none;
    color: var(--brown);
  }
  .clear-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    border: none;
    background: var(--line);
    border-radius: 50%;
    font-size: 18px;
    line-height: 1;
    color: var(--brown-deep);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .clear-btn.show { display: flex; }
  .count {
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 10px;
    font-weight: 500;
  }
  .count strong { color: var(--brown-deep); }
  .results {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .card {
    background: var(--bg-card);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 18px 18px 16px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .card.has-warning {
    border-color: var(--warning-border);
    border-width: 2px;
  }
  .card.has-danger {
    border-color: var(--danger-border);
    border-width: 2px;
  }
  .aviso {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 12px;
  }
  .aviso.warning {
    background: var(--warning-bg);
    color: var(--warning-ink);
    border: 1px solid var(--warning-border);
  }
  .aviso.danger {
    background: var(--danger-bg);
    color: var(--danger-ink);
    border: 1px solid var(--danger-border);
  }
  .aviso .ic {
    flex-shrink: 0;
    font-size: 16px;
    line-height: 1;
    margin-top: 1px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .card-name {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--brown-deep);
    line-height: 1.2;
    flex: 1;
  }
  .card-detail {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 500;
    margin-top: 2px;
    font-style: italic;
  }
  .badge {
    background: var(--brown-deep);
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
    padding: 5px 9px;
    border-radius: 6px;
    letter-spacing: 0.05em;
    white-space: nowrap;
    font-family: 'Inter', monospace;
  }
  .info-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 15px;
    color: var(--ink);
  }
  .info-row .ic {
    color: var(--accent);
    font-size: 16px;
    flex-shrink: 0;
  }
  .info-row .lbl {
    color: var(--ink-soft);
    font-size: 13px;
    font-weight: 500;
    margin-right: 2px;
  }
  .m2-big {
    margin-top: 12px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #fce8c4 0%, #f4d9a8 100%);
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .m2-big .lbl {
    font-size: 13px;
    color: var(--brown);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .m2-big .val {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--brown-deep);
  }
  .m2-big .val small { font-size: 14px; font-weight: 500; }
  .prices {
    margin-top: 12px;
    border-top: 1px dashed var(--line);
    padding-top: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .price {
    padding: 10px 12px;
    border-radius: 10px;
    background: #fff8ea;
    border: 1px solid var(--line);
  }
  .price.combo {
    background: linear-gradient(135deg, #fff 0%, #fef3e1 100%);
    border-color: var(--accent-soft);
  }
  .price-lbl {
    font-size: 11px;
    color: var(--ink-soft);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .price-val {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--brown-deep);
    margin-top: 4px;
    line-height: 1.1;
  }
  .price.combo .price-val { color: var(--accent); }
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-soft);
  }
  .empty .emoji {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.6;
  }
  .empty p { margin: 4px 0; font-size: 15px; }
  .hint {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
  }
  .hint .emoji { font-size: 56px; margin-bottom: 14px; }
  .hint p { margin: 4px 0; font-size: 15px; line-height: 1.5; }
  .hint strong { color: var(--brown-deep); }
  footer {
    text-align: center;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px dashed var(--line);
    font-size: 12px;
    color: var(--ink-soft);
  }
  footer .prices-info {
    margin-top: 6px;
    font-weight: 600;
    color: var(--brown);
  }
  @media (max-width: 360px) {
    body { font-size: 16px; padding: 12px; }
    h1 { font-size: 28px; }
    .card-name { font-size: 18px; }
    .prices { grid-template-columns: 1fr; }
  }
</style>
</head>

const norm = s => (s || '').toString().toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g, '');

GRANJAS.forEach(g => {
  g._search = [g.nombre, g.localidad, g.codigo, g.detalle, g.departamento]
    .map(norm).join(' ');
});

const fmtMoney = n => '$' + new Intl.NumberFormat('es-AR', {
  minimumFractionDigits: 2, maximumFractionDigits: 2
}).format(n);

const fmtM2 = n => {
  if (n % 1 !== 0) {
    return new Intl.NumberFormat('es-AR', {
      minimumFractionDigits: 1, maximumFractionDigits: 1
    }).format(n);
  }
  return new Intl.NumberFormat('es-AR').format(n);
};

const escapeHtml = s => (s || '').toString()
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

function renderAviso(g) {
  if (g.aviso === 'codigo_dup') {
    return `<div class="aviso danger">
      <span class="ic">⚠</span>
      <span>Este código (Nº ${escapeHtml(g.codigo)}) aparece <strong>repetido</strong> en otra granja. Verificar con el archivo original cuál es la correcta.</span>
    </div>`;
  }
  if (g.aviso === 'posible_dup') {
    return `<div class="aviso warning">
      <span class="ic">⚠</span>
      <span>Hay otra granja con el mismo nombre, localidad y m² exactos. <strong>Posible duplicado</strong> — verificar.</span>
    </div>`;
  }
  return '';
}

function renderCard(g) {
  const simple = g.m2 * PRECIO_SIMPLE;
  const piso = g.m2 * PRECIO_PISO;
  const dep = g.departamento && g.departamento !== g.localidad
    ? `<span class="lbl">·</span> ${escapeHtml(g.departamento)}` : '';
  const cardClass = g.aviso === 'codigo_dup' ? 'card has-danger'
    : g.aviso === 'posible_dup' ? 'card has-warning' : 'card';

  return `
    <div class="${cardClass}">
      ${renderAviso(g)}
      <div class="card-head">
        <div>
          <div class="card-name">${escapeHtml(g.nombre)}</div>
          ${g.detalle ? `<div class="card-detail">${escapeHtml(g.detalle)}</div>` : ''}
        </div>
        <div class="badge">Nº ${escapeHtml(g.codigo)}</div>
      </div>
      <div class="info-row">
        <span class="ic">◉</span>
        <span class="lbl">Ubicación:</span>
        <span>${escapeHtml(g.localidad)} ${dep}</span>
      </div>
      <div class="m2-big">
        <span class="lbl">Superficie</span>
        <span class="val">${fmtM2(g.m2)} <small>m²</small></span>
      </div>
      <div class="prices">
        <div class="price">
          <div class="price-lbl">Lavado simple</div>
          <div class="price-val">${fmtMoney(simple)}</div>
        </div>
        <div class="price combo">
          <div class="price-lbl">Simple + piso</div>
          <div class="price-val">${fmtMoney(piso)}</div>
        </div>
      </div>
    </div>`;
}

const input = document.getElementById('q');
const results = document.getElementById('results');
const count = document.getElementById('count');
const clearBtn = document.getElementById('clearBtn');

function render(query) {
  const q = norm(query).trim();
  clearBtn.classList.toggle('show', q.length > 0);

  if (!q) {
    results.innerHTML = `
      <div class="hint">
        <div class="emoji">🐔</div>
        <p>Escribí el <strong>nombre</strong>, <strong>localidad</strong></p>
        <p>o <strong>número</strong> de la granja</p>
      </div>`;
    count.textContent = '';
    return;
  }

  const words = q.split(/\s+/).filter(Boolean);
  const matches = GRANJAS.filter(g =>
    words.every(w => g._search.includes(w))
  );

  count.innerHTML = matches.length === 0
    ? 'Sin resultados'
    : `<strong>${matches.length}</strong> ${matches.length === 1 ? 'granja encontrada' : 'granjas encontradas'}`;

  if (matches.length === 0) {
    results.innerHTML = `
      <div class="empty">
        <div class="emoji">🔍</div>
        <p>No se encontró ninguna granja con</p>
        <p><strong>"${escapeHtml(query)}"</strong></p>
      </div>`;
    return;
  }

  const shown = matches.slice(0, 50);
  results.innerHTML = shown.map(renderCard).join('');
  if (matches.length > 50) {
    results.innerHTML += `<div class="empty"><p>Se muestran las primeras 50 de ${matches.length}.</p><p>Refiná la búsqueda para ver menos.</p></div>`;
  }
}

input.addEventListener('input', e => render(e.target.value));
clearBtn.addEventListener('click', () => {
  input.value = '';
  input.focus();
  render('');
});

render('');
</script>
